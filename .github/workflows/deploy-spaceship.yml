name: Deploy Spaceship

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Simular deploy sin subir archivos"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      server_dir:
        description: "Directorio remoto de destino"
        required: true
        default: "/"
        type: string
      clean_remote:
        description: "Limpiar archivos remotos del directorio destino antes de subir"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload dist to Spaceship (FTP/FTPS)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.SPACESHIP_FTP_SERVER }}
          username: ${{ secrets.SPACESHIP_FTP_USERNAME }}
          password: ${{ secrets.SPACESHIP_FTP_PASSWORD }}
          local-dir: dist/
          server-dir: ${{ inputs.server_dir }}/
          dry-run: ${{ inputs.dry_run }}
          dangerous-clean-slate: ${{ inputs.clean_remote }}
